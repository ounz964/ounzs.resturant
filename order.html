<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Krusty Krab – Order</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root { --ocean:#006994; --seafoam:#00C6AE; --sandy:#F5C842; --coral:#FF6B5B; --shell:#FFF8E7; --dark:#1a3a4a; --krab-red:#C0392B; --krab-dark:#5c0000; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:linear-gradient(180deg,#003d5c 0%,#006994 40%,#00a8c6 100%); min-height:100vh; font-family:'Nunito',sans-serif; color:var(--dark); overflow-x:hidden; }
    body::before { content:''; position:fixed; inset:0; background-image:radial-gradient(circle,rgba(255,255,255,0.07) 2px,transparent 2px),radial-gradient(circle,rgba(255,255,255,0.04) 1px,transparent 1px); background-size:80px 80px,40px 40px; pointer-events:none; z-index:0; animation:bubbleFloat 20s linear infinite; }
    @keyframes bubbleFloat { from{background-position:0 0,20px 20px;} to{background-position:0 -200px,20px -180px;} }
    header { position:relative; z-index:10; text-align:center; padding:30px 20px 16px; background:linear-gradient(135deg,#8B1A00,#C0392B 50%,#8B1A00); border-bottom:6px solid var(--sandy); box-shadow:0 6px 30px rgba(0,0,0,0.4); }
    header::after { content:'🦀  🦀  🦀  🦀  🦀  🦀  🦀  🦀'; display:block; font-size:1.1rem; margin-top:8px; opacity:0.35; letter-spacing:10px; }
    .logo-wrap { display:flex; align-items:center; justify-content:center; gap:20px; flex-wrap:wrap; }
    .anchor-icon { font-size:3rem; animation:wobble 3s ease-in-out infinite; display:inline-block; }
    @keyframes wobble { 0%,100%{transform:rotate(-8deg);} 50%{transform:rotate(8deg);} }
    header h1 { font-family:'Bangers',cursive; font-size:clamp(2.8rem,8vw,5.5rem); color:var(--sandy); letter-spacing:4px; text-shadow:4px 4px 0 #5c0000,6px 6px 0 rgba(0,0,0,0.25); line-height:1; }
    .tagline { font-size:0.9rem; color:rgba(255,248,231,0.75); letter-spacing:3px; text-transform:uppercase; margin-top:4px; font-weight:700; }
    nav { position:relative; z-index:10; display:flex; justify-content:center; background:var(--sandy); border-bottom:4px solid var(--krab-red); }
    nav a { display:block; padding:13px 28px; color:var(--krab-dark); text-decoration:none; font-family:'Bangers',cursive; font-size:1.15rem; letter-spacing:2px; transition:all 0.2s; }
    nav a:hover, nav a.active { background:var(--krab-red); color:var(--sandy); }
    .form-section { position:relative; z-index:1; max-width:680px; margin:60px auto; padding:0 20px 70px; }
    .page-title { font-family:'Bangers',cursive; font-size:clamp(2.2rem,6vw,3.5rem); color:white; text-align:center; letter-spacing:4px; text-shadow:3px 3px 0 rgba(0,0,0,0.3); margin-bottom:6px; }
    .page-sub { text-align:center; font-size:1rem; color:rgba(255,255,255,0.75); margin-bottom:36px; font-weight:700; }
    .form-card { background:var(--shell); border-radius:24px; padding:44px 48px; box-shadow:0 16px 50px rgba(0,0,0,0.4),0 0 0 4px var(--sandy); border-top:6px solid var(--krab-red); }
    .form-group { margin-bottom:26px; }
    .form-card label { display:block; font-size:0.78rem; letter-spacing:2px; text-transform:uppercase; color:var(--krab-dark); margin-bottom:8px; font-weight:900; }
    input[type="text"], input[type="email"], input[type="number"], select { width:100%; padding:13px 16px; background:white; border:2px solid #ddd; border-radius:10px; color:var(--dark); font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:700; transition:border-color 0.3s,box-shadow 0.3s; outline:none; }
    input:focus, select:focus { border-color:var(--krab-red); box-shadow:0 0 0 3px rgba(192,57,43,0.15); }
    .submit-btn { width:100%; padding:17px; background:var(--krab-red); color:var(--sandy); border:none; border-radius:50px; font-family:'Bangers',cursive; font-size:1.5rem; letter-spacing:4px; cursor:pointer; transition:all 0.25s; box-shadow:4px 4px 0 var(--krab-dark),0 10px 30px rgba(192,57,43,0.3); margin-top:10px; }
    .submit-btn:hover { background:var(--sandy); color:var(--krab-red); transform:translateY(-3px); }
    .back-link { text-align:center; margin-top:22px; }
    .back-link a { color:rgba(255,255,255,0.65); text-decoration:none; font-size:0.85rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; transition:color 0.3s; }
    .back-link a:hover { color:var(--sandy); }
    footer { position:relative; z-index:10; text-align:center; padding:26px 20px; background:rgba(0,0,0,0.35); color:rgba(255,255,255,0.45); font-size:0.82rem; letter-spacing:1px; border-top:3px solid var(--sandy); }
    @media(max-width:580px) { .form-card{padding:28px 20px;} }
  </style>
</head>
<body>

  <header>
    <div class="logo-wrap">
      <span class="anchor-icon">⚓</span>
      <div>
        <h1>The Krusty Krab</h1>
        <p class="tagline">Home of the Famous Krabby Patty · Bikini Bottom</p>
      </div>
      <span class="anchor-icon">⚓</span>
    </div>
  </header>

  <nav>
    <a href="menu.html">🍔 Menu</a>
    <a href="order.html" class="active">📋 Order</a>
    <a href="thanks.html">⭐ About</a>
  </nav>

  <div class="form-section">
    <h2 class="page-title">📋 Place Your Order!</h2>
    <p class="page-sub">🦀 Mr. Krabs is standing by… every penny counts! 🦀</p>

    <div class="form-card">
      <form action="thanks.html" method="get">

        <div class="form-group">
          <label for="name">👤 Your Name</label>
          <input type="text" id="name" name="name" placeholder="e.g. SpongeBob SquarePants" required/>
        </div>

        <div class="form-group">
          <label for="email">📧 Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@bikini-bottom.com" required/>
        </div>

        <div class="form-group">
          <label for="food">🍔 Choose Your Food</label>
          <select id="food" name="food" required>
            <option value="" disabled selected>-- Pick your order --</option>
            <option value="Krabby Patty">🍔 Krabby Patty — $5.99</option>
            <option value="Double Krabby">🔥 Double Krabby — $8.99</option>
            <option value="Coral Bits Pizza">🍕 Coral Bits Pizza — $8.49</option>
            <option value="Squidward Pasta">🦑 Squidward's Pasta — $11.99</option>
            <option value="Sandy Donuts">🍩 Sandy's Donuts — $4.50</option>
            <option value="Kelp Shake">🥤 Kelp Shake — $3.75</option>
          </select>
        </div>

        <div class="form-group">
          <label for="quantity">🔢 Quantity</label>
          <input type="number" id="quantity" name="quantity" min="1" max="50" value="1" required/>
        </div>

        <button type="submit" class="submit-btn">🦀 CONFIRM ORDER! 🦀</button>
      </form>
    </div>

    <div class="back-link">
      <a href="menu.html">← Back to Menu</a>
    </div>
  </div>

  <footer>🦀 © 2026 The Krusty Krab · Created by Malak Omar Waleed – Class A 🦀</footer>
</body>
</html>
